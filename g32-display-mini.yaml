                clickable: true
                text: " "
                on_press:
                  - script.execute: toggle_settings_page

  pages:
    - id: arcs_page
      bg_color: 0
      bg_opa: COVER
      pad_all: 0
      widgets:
        - obj:  # only for drawing the horizontal divider
            id: zones_bar
