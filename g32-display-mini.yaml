lvgl:
  buffer_size: 50%
  displays: my_display
  touchscreens: my_touchscreen
  bg_color: 0
  border_width: 0
  outline_width: 0
  theme:
    label:
      bg_color: 0
      bg_opa: COVER
      width: 120
      text_align: CENTER
    bar:
      radius: 5
      indicator:
        radius: 5
        arc_color: red
    arc:
      radius: 5
      indicator:
        arc_rounded: false
        radius: 5
    roller:
      text_font: MONTSERRAT_20
      width: 60
      selected:
        text_font: MONTSERRAT_BOLD_FONT_18
    slider:
      bg_opa: COVER
      radius: 0
      adv_hittest: true
      border_width: 0
      indicator:
        radius: 0
      knob:
        radius: 2

    textarea:
      width: 340
      height: 30
      text_font: MONTSERRAT_18
      border_width: 1
    keyboard:
      text_color: ${COLOR_100}
      bg_color: ${COLOR_25}
      items:
        bg_color: ${COLOR_100}
        text_color: ${COLOR_25}

  style_definitions:
    - id: arc_value_style
      x: 1
      y: 1
      width: 74
      height: 74
      arc_opa: COVER
      arc_rounded: false
      arc_width: 5
    - id: arc_limit_style
      x: 4
      y: 4
      width: 68
      height: 68
      arc_opa: 100%
      arc_rounded: false
      arc_width: 2
      arc_color: 0
    - id: item_obj_style
      width: 76
      height: 76
      bg_color: 0
      pad_all: 0
      radius: 0
      outline_width: 0
      border_width: 0
      outline_pad: 0

  # send display to idle state after timeout
  on_idle:
    timeout: !lambda "return(id(settings_display_timeout_value_persistent) * 1000);"
    then:
    - if:
        condition:
          - lambda: "return id(settings_display_timeout_value_persistent) > 0;"
        then:
          - logger.log: "Display is idle"
          - light.turn_off: backlight
          - lvgl.pause:

  # boot screen with spinner - just for fun
  top_layer:
    widgets:
      - obj:
          id: boot_screen
          x: 0
          y: 0
          width: 320
          height: 172
          bg_color: 0
          bg_opa: COVER
          radius: 0
          pad_all: 0
          border_width: 0
          widgets:
            - spinner:
                id: boot_spinner
                align: CENTER
                spin_time: 1s
                arc_length: 60deg
                arc_width: 4
                arc_color: 0
                indicator:
                  arc_color: 0  # overridden after color scheme is known
                  arc_width: 4

      - obj:
          id: status_bar_right
          x: 304
          y: 0
          width: 16
          height: 172
          bg_color: 0
          bg_opa: COVER
          pad_all: 0
          border_width: 0
          hidden: true
          radius: 0
          widgets:            
            - obj: # symbol for batter low warning
                id: battery_symbol_obj
                x: 0
                y: 11
                width: 16
                height: 20
                bg_color: 0
                pad_all: 0
                outline_width: 0
                border_width: 0
                border_side: NONE
                radius: 0
                hidden: !lambda |-
                  return id(settings_hide_soc_persistent);
                widgets:
                  - label:
                      id: battery_symbol
                      x: 0
                      y: 0
                      text_font: ICON_FONT_20
                      text_align: LEFT
                      width: 15
                      text_color: !lambda |-
                        if( id(battery_soc_value) <= id(settings_min_soc_value_persistent) ) {
                          return lv_color_hex(id(color_bad));
                        }
                        return lv_color_hex(id(color_good));
                      text: !lambda |-
                        const char* icons[4] = {"\U000F008E","\U000F12A1","\U000F12A2","\U000F12A3"};
                        float soc = id(battery_soc_value);
                        int idx = soc <= 15 ? 0 :
                            soc <= 40 ? 1 :
                            soc <= 80 ? 2 : 3;
                        return icons[idx];
                  - line:
                      id: battery_symbol_fix  # glyph scaling artefact
                      points:
                        - 8, 6
                        - 12, 6
                      line_width: 1
                      line_rounded: false
                      line_color: !lambda |-
                          float soc = id(battery_soc_value);
                          if (soc <= 80) {
                            return lv_color_hex(0x000000);
                          }
                          if( id(battery_soc_value) <= id(settings_min_soc_value_persistent) ) {
                            return lv_color_hex(id(color_bad));
                          }
                          return lv_color_hex(id(color_good));
            - label: # symbol for successfull BT connection
                id: g32bt_connect_label
                x: 0
                y: 29
                text_font: ICON_FONT_18
                text_align: LEFT
                width: 16
                text_color: !lambda |-
                  if( id(g32_connected) ) {
                    return lv_color_hex(id(color_good));
                  }
                  return lv_color_hex(id(color_00));
                text: "\U000F00AF"
            - label: # symbol for successfull WIFI connection
                id: wifi_connect_label
                x: 3
                y: 47
                text_font: MONTSERRAT_10
                text_align: LEFT
                width: 13
                text_color: !lambda |-
                  if( id(wifi_connected) ) {
                    return lv_color_hex(id(color_good));
                  }
                  return lv_color_hex(id(color_00));
                text: "\uF1EB" # WIFI symbol
            - label:
                id: warning_on_label
                x: 4
                y: 61
                text_font: MONTSERRAT_10
                text_color: !lambda |-
                  if (millis() - id(boot_start_time) < 15000) {
                    // first 15 seconds after boot: no warning
                    return lv_color_hex(id(color_00));
                  }
                  if((id(meater_alarms_tip) > 0)
                    || (id(meater_alarms_ambient) > 0)
                    || (id(battery_soc_value) <= id(settings_min_soc_value_persistent))
                    || id(warning_on)
                    || (id(g32_connected) && (id(gas_percent) <= id(settings_min_gas_value_persistent)))
                  ) {
                    return lv_color_hex(id(color_bad));
                  }
                  return lv_color_hex(id(color_00));
                text_align: LEFT
                width: 12
                text: "\uF071"
            - obj:
                id: gas_level_obj
                x: 0
                y: 81
                width: 16
                height: 91
                pad_all: 0
                bg_color: 0
                border_width: 0
                radius: 0
                hidden: !lambda |-
                  return id(settings_hide_gas_level_persistent);
                widgets:
                  - bar:
                      id: gas_percent_bar
                      x: 5
                      y: 0
                      height: 80
                      width: 8
                      radius: 0
                      min_value: 1
                      max_value: 100
                      bg_opa: COVER
                      bg_color: !lambda return lv_color_hex(id(color_25));
                      indicator:
                        radius: 0
                        bg_color: !lambda return lv_color_hex(id(color_100)); // placeholder
                      value: !lambda |-
                        int y = id(gas_weight);
                        if( y < 0) {
                          return 0;
                        }
                        int z = id(gas_percent);
                        if( z <= id(settings_min_gas_value_persistent) ) {
                          lv_obj_set_style_bg_color(id(gas_percent_bar), lv_color_hex(id(color_bad)), LV_PART_INDICATOR);
                        } else {                          
                          lv_obj_set_style_bg_color(id(gas_percent_bar), lv_color_hex(id(color_good)), LV_PART_INDICATOR);
                        }
                        return z;
                  - label:  # 1/10
                      x: 4
