sensor:
  - platform: adc
    pin: GPIO0
    name: "Battery SOC"
    unit_of_measurement: "%"
    state_class: measurement
    device_class: battery
    accuracy_decimals: 0
    attenuation: 12db
    samples: 16                # samples taken per update interval
    filters:
      - multiply: 3.0          # due to external voltage divider on adc input
      - sliding_window_moving_average:
          window_size: 15      # average over 15 values
      - calibrate_linear:      # linearise voltage->SOC dependency
          method: exact
          datapoints:
            - 3.00 ->   0.0    # <=3.00V = battery empty (0.0%)
            - 3.36 ->   5.0
            - 3.41 ->  10.0
            - 3.48 ->  20.0
            - 3.52 ->  30.0
            - 3.56 ->  40.0
            - 3.61 ->  50.0
            - 3.70 ->  60.0
            - 3.79 ->  70.0
            - 3.89 ->  80.0
            - 4.00 ->  90.0
            - 4.05 -> 100.0    # >=4.05V = battery full (100.0%)
      - clamp:
          min_value: 0.0
          max_value: 100.0
    update_interval: 4s        # new value after 4s*15(=window size) = 60s!
    on_value:
      - lambda: id(battery_soc_value) = x;
      - lvgl.widget.refresh: [battery_symbol, battery_symbol_fix]

  - platform: ble_rssi
    mac_address: ${g32_mac_address}
    name: "BT Signal Strength"
  - platform: wifi_signal
    name: "WiFi Signal Strength ESP32"
    update_interval: 10s
  - platform: internal_temperature
    name: "CPU Temperature ESP32"
    update_interval: 10s
    device_class: temperature
    state_class: measurement
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: ble_client
    ble_client_id: ow_g32
    type: characteristic
    name: "G32 Datablock Read"
    service_uuid: ${g32_service_uuid}
    characteristic_uuid: ${g32_characteristic_uuid_tx}
    update_interval: 10s
    lambda: |-
      if (x.size() < 32) {
        ESP_LOGW("ble", "Received invalid BLE data (size: %d), skipping.", x.size());
        return {};
      }
      float t = (x[6]*10.0+x[7]/10.0);
      id(g32_zone1).publish_state(t);
      t = (x[8]*10.0+x[9]/10.0);
      id(g32_zone2).publish_state(t);
      t = (x[10]*10.0+x[11]/10.0);
      id(g32_zone3).publish_state(t);
      t = (x[12]*10.0+x[13]/10.0);
      id(g32_zone4).publish_state(t);

      if ((id(active_meaters) & (1 << 0)) == 0) {
        t = (x[14]*10.0+x[15]/10.0);
        id(g32_probe1).publish_state(t);
      }                  
      if ((id(active_meaters) & (1 << 1)) == 0) {
        t = (x[16]*10.0+x[17]/10.0);
        id(g32_probe2).publish_state(t);
      }                  
      if ((id(active_meaters) & (1 << 2)) == 0) {
        t = (x[18]*10.0+x[19]/10.0);
        id(g32_probe3).publish_state(t);
      }                  
      if ((id(active_meaters) & (1 << 3)) == 0) {
        t = (x[20]*10.0+x[21]/10.0);
        id(g32_probe4).publish_state(t);
      }                  
      t = (x[22]*256+x[23]);
      id(g32_gas_weight).publish_state(t);
      t = (x[24]);
      id(g32_firebox_open).publish_state(t);
      if (id(g32_firebox_open)){  // no light if firebox is closed
        t = (x[25]);
      } else {
        t = 0;
      }
      id(g32_light_on).publish_state(t);
      t = (x[31]);
      id(g32_gas_percent).publish_state(t);
      return (x[30]);

  - platform: template
    name: "G32 Zone 1"
    id: g32_zone1
    device_class: "temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    on_value:
      - lambda: id(zone1_value) = x;
      - lvgl.widget.refresh: [zone1_label, zone1_label_large, zone1_arc]

  - platform: template
    name: "G32 Zone 2"
    id: g32_zone2
    device_class: "temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    on_value:
      - lambda: id(zone2_value) = x;
      - lvgl.widget.refresh: [zone2_label, zone2_label_large, zone2_arc]

  - platform: template
    name: "G32 Zone 3"
    id: g32_zone3
    device_class: "temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    on_value:
      - lambda: id(zone3_value) = x;
      - lvgl.widget.refresh: [zone3_label, zone3_label_large, zone3_arc]

  - platform: template
    name: "G32 Zone 4"
