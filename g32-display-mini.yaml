  # Name of the ESPHome device (modify if you like, avoid special characters)
  name: g32-display-mini
  device_description: "Monitor an OW G32 grill "
  version: "BTmini 1.0.0"

  # either pull values from secrets.yaml
  # or have it directly in this file
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  # wifi_ssid: "INSERT_YOUR_WIFI_SSID"
  # wifi_password: "INSERT_YOUR_WIFI_PASSWORD"

  # Enter data of the newly created Home Assistant ESPHome device. Example:
  api_encryption_key: "YcM9Kcc+DRDHfISFcF8FlDN0WuanM1LJV3duK/PugZA="

  # over-the-air updates (ESPHome CLI or Home Assistant add-On)
  # Hint: if you changed this value on the device, you might have to alter
  # this value here to match it. esphome cli uses the value from the yaml for the ota update!
  ota_password: "8fdf9f656d36180bfba92d596c9e7db4"

  # color scheme
  SETTINGS_COLOR_SCHEME_IDX: "0"  # initially selected color scheme
  color_scheme_options: |  # required for Home Assistant
    - "white"
    - "amber"
    - "cyan"
    - "night red"
    - "green"
    - "night blue"
    - "purple"
    - "yellow"
    - "white (clean)"
  COLOR_SCHEMES: |
    //                  idx 100%      75%       50%       25%       <=25%    GOOD      BAD       LIGHT
    {
      {"white",         {0, 0xffffff, 0xcccccc, 0x808080, 0x404040, 0x404040, 0x8bff85, 0xff5757, 0xffff00}},
      {"amber",         {1, 0xffb900, 0xbd8a00, 0x805d00, 0x392900, 0x392900, 0x58b100, 0xff5600, 0xffff00}},
      {"cyan",          {2, 0x68e2fb, 0x00acbf, 0x007582, 0x003c43, 0x003c43, 0x75fb8a, 0xea838d, 0xffff00}},
      {"night red",     {3, 0xff0059, 0xc00044, 0x80002e, 0x400018, 0x400018, 0xff0059, 0xe4d300, 0xffff00}},
      {"green",         {4, 0x06bd00, 0x058d00, 0x046f00, 0x003008, 0x003008, 0x00ff00, 0xfe3a03, 0xffff00}},
      {"night blue",    {5, 0x1a00ff, 0x1300b6, 0x0d007a, 0x040028, 0x040028, 0x00ff4d, 0xff0092, 0xffff00}},
      {"purple",        {6, 0xff00e4, 0xc000ac, 0x800073, 0x32002d, 0x32002d, 0x00ffb0, 0xff1100, 0xffff00}},
      {"yellow",        {7, 0xffda00, 0xbea300, 0x806d00, 0x262000, 0x262000, 0x64dc00, 0xff5900, 0xffff00}},
      {"white (clean)", {8, 0xffffff, 0xbfbfbf, 0x808080, 0x404040, 0x000000, 0x8bff85, 0xff5757, 0xffff00}}
    }

  FORCE_SHADOW_COLOR_TO_BLACK: 'false'  # standard: use COLOR_00 for shadows
  # FORCE_SHADOW_COLOR_TO_BLACK: 'true'  # alternative: symbol and text shadows should not be visible

  # max temperature for zones and sensors
  Zone_Max: "500"
  Sensor_Max: "100"

  # minimum gas tank level
  SETTINGS_HIDE_GAS_LEVEL: "false"
  SETTINGS_MIN_GAS_VALUE: "15"

  # battery SOC
  SETTINGS_HIDE_SOC: "false"
  SETTINGS_MIN_SOC_VALUE: "25"

  # interval for alarm sound
  Beeper_interval: "5s"

  # Meater protetion alerts
  meater_tip_alert: '100'  # Specs: 100°C (original Meater: 100°C, 105°C (Meater PRO - not supported yet)
  meater_ambient_alert: '270'  # Specs: 275°C (original Meater), 550°C (Meater PRO - not supported yet)

  # sounds (in RTTTL syntax):
  G32_Connect_Sound: "pling2:d=16,o=6,b=140:e6,32p,d6"
  G32_Disconnect_Sound: "siren:d=8,o=5,b=100:d,e,d,e,d,e,d,e"
  MT_Connect_Sound: "Pling4:d=16,o=5,b=100:a5,32p,a6"
  MT_Disconnect_Sound: "plonk:d=16,o=5,b=100:a6,32p,a5"
  Wifi_Connect_Sound: "dadi:d=16,o=6,b=140:d6,32p,e6"
  Wifi_Disconnect_Sound: "siren:d=8,o=5,b=100:d,e,d,e,d,e,d,e"
  Zone_Limit_Alarm_Sound: "dadidadi:d=8,o=5,b=150:d,e,d,e,d,e,d,e"
  Sensor_Limit_Alarm_Sound: "didadida:d=8,o=5,b=150:e,d,e,d,e,d,e,d"
  New_MAC_Sound: "click:d=32,o=6,b=120:32c,32p"

  # D A N G E R  Z O N E! # # # # # # # # # # # # # # # # # # # # # # # # # # # # 
  # From here on, please only make changes if you know what you are doing and   #
  # have an idea of what you want to achieve. :)                                #
  # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # #

  g32_mac_address: 94:E6:86:00:00:00
  g32_service_uuid: dc0f41ea-b6ae-46a8-a19e-1a3bf4342bcb
  g32_characteristic_uuid_tx: 'dc0f41e2-b6ae-46a8-a19e-1a3bf4342bcb'
  # g32_characteristic_uuid_rx: 'dc0f41e1-b6ae-46a8-a19e-1a3bf4342bcb'  # from the original OW app

  meater_mac_address: B8:1F:5E:00:00:00
  meater_service_uuid: 'a75cc7fc-c956-488f-ac2a-2dbc08b63a04'
  meater_characteristic_uuid_temp: '7edda774-045e-4bbf-909b-45d1991a2876'
  meater_characteristic_uuid_battery: '2adb4877-68d8-4884-bd3c-d83853bf27b8'

  Invalid_Sensor_Value: '1500'  # 1500 (and above) means "invalid"

  # shades of white (initial start values since substitutions work best)
  COLOR_100:   "0xffffff"  # 100% brightness
  COLOR_75:    "0xbfbfbf"  #  75%
  COLOR_50:    "0x808080"  #  50%
  COLOR_25:    "0x404040"  #  25%
  COLOR_00:    "0x404040"  # shadows
  COLOR_GOOD:  "0x8bff85"
  COLOR_BAD:   "0xff5757"
  COLOR_LIGHT: "0xffff00"

esphome:
  name: ${name}
  build_path: /tmp/esphome_build/${name}

  project:
    name: "g32.bt_display320_172"
    version: ${version}

  on_boot:
    # priority: 1100 # stay above 1000 and below 1500!  # CHANGE FOR MINI
    then:
      - lambda: id(boot_start_time) = millis();
      - light.turn_on: backlight
      - script.execute: ble_g32_scan_start  # automatically start g32 mac scan
      - script.execute: ble_meater_scan_start  # automatically start meater mac scan

esp32:
  board: esp32-c6-devkitc-1
  # variant: esp32c6  # use either board: or variant
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      # CONFIG_ESP_TASK_WDT_EN: n  # Disables Task Watchdog Timer (TWDT)
      CONFIG_ESP_INT_WDT: "n"      # Disables Interrupt Watchdog Timer (IWDT)
      # COMPILER_OPTIMIZATION_SIZE: "y"  # optimize for size
      CONFIG_COMPILER_OPTIMIZATION_PERF: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_ESP_WIFI_TASK_CORE_ID: "0"
      CONFIG_BT_BTC_TASK_CORE_ID: "0"
      CONFIG_BT_NIMBLE_PINNED_TO_CORE: "0"
      CONFIG_TCPIP_TASK_CORE_ID: "0"
      CONFIG_ESP_TIMER_TASK_CORE_ID: "0"
      CONFIG_ESP_MAIN_TASK_AFFINITY_CPU1: "y"

# psram:   # CHANGE FOR MINI
#   mode: octal
#   speed: 80MHz

logger:
  baud_rate: 921600  # enable logging
  # baud_rate: 0  # no logging -> saves power

api: # enable Home Assistant API
  max_connections: 5
  encryption:
    key: ${api_encryption_key}
  reboot_timeout: 0s  

http_request:
  # optional global defaults (recommended for reliability)
  timeout: 5s
  verify_ssl: true
  follow_redirects: true

ota:
  - platform: esphome
    id: my_ota
    password: ${ota_password}

wifi:
  id: my_wifi
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  fast_connect: False
  reboot_timeout: 0s
  on_connect:
    then:
      - rtttl.play: ${Wifi_Connect_Sound}
      - lambda: |-
          id(current_ip_address) = id(wifi_ip_sensor).state.c_str();
      - globals.set:
          id: wifi_connected
          value: 'true'
      - globals.set:
          id: apply_wifi_started_by_user
          value: 'false'
      - lvgl.widget.refresh: wifi_connect_label
      - lvgl.widget.refresh: current_wifi_ip_label
  on_disconnect:
    then:
      - rtttl.play: ${Wifi_Disconnect_Sound}
      - globals.set:
          id: wifi_connected
          value: 'false'
      - globals.set:
          id: current_ip_address
          value: '" "'  # not connected
      - lvgl.widget.refresh: wifi_connect_label
      - lvgl.widget.refresh: current_wifi_ip_label

esp32_ble:
  # 1xG32, 4xMeater probes -> maximum 5 connections needed
  max_connections: 5  # new option since 2025.10.15, used to be under the esp32_ble_tracker component

esp32_ble_tracker:
  on_ble_advertise:
    then:
      - lambda: |-
          if (x.get_name().rfind("OWG-G32C", 0) == 0 && id(ble_g32_scan_started_by_user)) {
            id(settings_g32_mac_address_persistent) = x.address_str();
            // id(my_rtttl).play("${New_MAC_Sound}");
            ESP_LOGI("ble_adv", "G32 MAC address: %s", x.address_str().c_str());
            id(ble_g32_scan_stop).execute();
            id(apply_mac_address).execute();
          }

          if ((x.get_name() == "MEATER" || x.get_name() == "MEATER+") && id(ble_meater_scan_started_by_user)) {
            if (id(ble_meaters_found) < 15) {
              if (!x.get_manufacturer_datas().empty() && !x.get_manufacturer_datas()[0].data.empty()) {  // assert data is available
                int probe_id = x.get_manufacturer_datas()[0].data[0];  // first data byte

                // for solo meaters without probe ID (issue reported by @JBecker32)
                if (probe_id == 0) {
                  probe_id = 1;
                }

                if (probe_id > 0 && probe_id < 5) {
                  int idx = probe_id-1;
                  if ((id(ble_meaters_found) & (1 << idx)) == 0) {
                    id(ble_meaters_found) |= (1 << idx);
                    // id(my_rtttl).play("${New_MAC_Sound}");
                    ESP_LOGI("ble_adv", "Meater MAC address: %s", x.address_str().c_str());
                    id(settings_meater_mac_addresses)[idx] = x.address_str();
                    id(apply_meater_mac_addresses).execute();
                  }
                }
              }
            }
            if (id(ble_meaters_found) >= 15) {
              id(ble_meater_scan_stop).execute();
            }
          } 

ble_client:
  - mac_address: ${g32_mac_address}  # must be dynamically applied later
    id: ow_g32
    on_connect:
      then:
        - rtttl.play: ${G32_Connect_Sound}
        - globals.set:
            id: g32_connected
            value: 'true'
        - lvgl.widget.refresh: g32bt_connect_label
    on_disconnect:
      then:
        - rtttl.play: ${G32_Disconnect_Sound}
        - globals.set:
            id: g32_connected
            value: 'false'
        - lvgl.widget.refresh: g32bt_connect_label
        - globals.set:
            id: gas_weight
            value: '-1'
        - lvgl.widget.refresh: gas_weight_label
        - globals.set:
            id: gas_percent
            value: '0'
        - lvgl.widget.refresh: [gas_percent_bar]
        - globals.set:
            id: zone1_value
            value: ${Invalid_Sensor_Value}
        - globals.set:
            id: zone2_value
            value: ${Invalid_Sensor_Value}
        - globals.set:
            id: zone3_value
            value: ${Invalid_Sensor_Value}
        - globals.set:
            id: zone4_value
            value: ${Invalid_Sensor_Value}
        - globals.set:
            id: sensor1_value
            value: ${Invalid_Sensor_Value}
        - globals.set:
            id: sensor2_value
            value: ${Invalid_Sensor_Value}
        - globals.set:
            id: sensor3_value
            value: ${Invalid_Sensor_Value}
        - globals.set:
            id: sensor4_value
            value: ${Invalid_Sensor_Value}
        - globals.set:
            id: active_sensors
            value: "0"
        - script.execute: refresh_all_temps

  - mac_address: ${meater_mac_address}
    id: meater0
    on_connect:
      then:
        - lambda: |-
            id(active_meaters) |= 0x01;
            id(meater_alarms_tip) |= 0x01;
            id(meater_alarms_ambient) |= 0x01;
        - rtttl.play: ${MT_Connect_Sound}
    on_disconnect:
      then:
        - lambda: |-
            id(active_meaters) &= ~0x01;
            id(meater_alarms_tip) &= ~0x01;
            id(meater_alarms_ambient) &= ~0x01;
        - lambda: |-
            id(g32_probe1).publish_state(${Invalid_Sensor_Value});
        - rtttl.play: ${MT_Disconnect_Sound}
        - script.execute: refresh_all_meater_alerts
  - mac_address: ${meater_mac_address}
    id: meater1
    on_connect:
      then:
        - lambda: |-
            id(active_meaters) |= 0x02;
            id(meater_alarms_tip) |= 0x02;
            id(meater_alarms_ambient) |= 0x02;
        - rtttl.play: ${MT_Connect_Sound}
    on_disconnect:
      then:
        - lambda: |-
            id(active_meaters) &= ~0x02;
            id(meater_alarms_tip) &= ~0x02;
            id(meater_alarms_ambient) &= ~0x02;
        - lambda: |-
            id(g32_probe2).publish_state(${Invalid_Sensor_Value});
        - rtttl.play: ${MT_Disconnect_Sound}
        - script.execute: refresh_all_meater_alerts
  - mac_address: ${meater_mac_address}
    id: meater2
    on_connect:
      then:
        - lambda: |-
            id(active_meaters) |= 0x04;
            id(meater_alarms_tip) |= 0x04;
            id(meater_alarms_ambient) |= 0x04;
        - rtttl.play: ${MT_Connect_Sound}
    on_disconnect:
      then:
        - lambda: |-
            id(active_meaters) &= ~0x04;
            id(meater_alarms_tip) &= ~0x04;
            id(meater_alarms_ambient) &= ~0x04;
        - lambda: |-
            id(g32_probe3).publish_state(${Invalid_Sensor_Value});
        - rtttl.play: ${MT_Disconnect_Sound}
        - script.execute: refresh_all_meater_alerts
  - mac_address: ${meater_mac_address}
    id: meater3
    on_connect:
      then:
        - lambda: |-
            id(active_meaters) |= 0x08;
            id(meater_alarms_tip) |= 0x08;
            id(meater_alarms_ambient) |= 0x08;
        - rtttl.play: ${MT_Connect_Sound}
    on_disconnect:
      then:
        - lambda: |-
            id(active_meaters) &= ~0x08;
            id(meater_alarms_tip) &= ~0x08;
            id(meater_alarms_ambient) &= ~0x08;
        - lambda: |-
            id(g32_probe4).publish_state(${Invalid_Sensor_Value});
        - rtttl.play: ${MT_Disconnect_Sound}
        - script.execute: refresh_all_meater_alerts

# External Components
external_components:
  - source: github://widget/esphome-components
    components: [axs5106]
    refresh: 0s


i2c: # used for touchscreen
  - id: touchscreen_bus
    sda: GPIO18
    scl: GPIO19
    frequency: 400kHz
    scan: false
  # I2C Bus:
  #   SDA Pin: GPIO18
  #   SCL Pin: GPIO19
  #   Frequency: 400000 Hz
  #   Recovery: bus successfully recovered
  # Results from bus scan:
  # Found device at address 0x63
  # Found device at address 0x6B

# Touchscreen
touchscreen:
  - platform: axs5106
    id: my_touchscreen
    i2c_id: touchscreen_bus
    interrupt_pin: 21
    reset_pin: 20
    calibration:
      x_min: 0
      y_min: 0
      y_max: 172
      x_max: 320
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: true
    # for test purposes, touch coordinates can be logged
    # on_touch:
    #     - lambda: |-
    #         ESP_LOGI("Touch", "Touch detected at x=%d, y=%d", touch.x, touch.y);
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "Display is resuming"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: backlight

spi:  # used for display
  clk_pin: GPIO1
  mosi_pin: GPIO2

display:
  - platform: ili9xxx
    id: my_display
    model: ST7789V
    dc_pin: GPIO15
    cs_pin: GPIO14
    reset_pin: GPIO22
    dimensions:
      width: 320
      height: 172
      offset_height: 34
      offset_width: 0
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: true
    invert_colors: false
    data_rate: 80MHz
    color_order: bgr
    # update_interval: 1s
    
output:
  - platform: ledc
    id: gpio_backlight_pwm
    pin: GPIO23

  - id: helper_low_beeper
    platform: ledc
    pin: GPIO6
  - platform: ledc
    id: rtttl_out
    pin: GPIO5

light:
  - id: backlight
    name: Backlight
    platform: monochromatic
    output: gpio_backlight_pwm
    restore_mode: ALWAYS_ON
    internal: true

rtttl:
  id: my_rtttl
  output: rtttl_out
  gain: 80%

interval:
  - interval: 10s
    then:
      - lvgl.widget.refresh: warning_on_label
  - interval: ${Beeper_interval}
    then:
      - lambda: |-
          if( ((id(zone1_limit_value) > 0) && (id(zone1_value) >= id(zone1_limit_value)))
           || ((id(zone2_limit_value) > 0) && (id(zone2_value) >= id(zone2_limit_value)))
           || ((id(zone3_limit_value) > 0) && (id(zone3_value) >= id(zone3_limit_value)))
           || ((id(zone4_limit_value) > 0) && (id(zone4_value) >= id(zone4_limit_value)))
           || id(meater_alarms_ambient) > 0 || id(meater_alarms_tip) > 0 ) {
            id(my_rtttl).play("${Zone_Limit_Alarm_Sound}");
          }
          else if ( ((id(sensor1_limit_value) > 0) && (id(sensor1_value) >= id(sensor1_limit_value)))
                 || ((id(sensor2_limit_value) > 0) && (id(sensor2_value) >= id(sensor2_limit_value)))
                 || ((id(sensor3_limit_value) > 0) && (id(sensor3_value) >= id(sensor3_limit_value)))
                 || ((id(sensor4_limit_value) > 0) && (id(sensor4_value) >= id(sensor4_limit_value))) ) {
            id(my_rtttl).play("${Sensor_Limit_Alarm_Sound}");
          }
  - interval: 1s
    then:
      - if:
          condition:
            and:
              - lambda: return !id(boot_screen_color_scheme_init);
          then:
            - lambda: |-
                id(boot_screen_color_scheme_init) = true;
                id(apply_color_scheme).execute();

      - if:
          condition:
            and:
              - lambda: 'return !id(boot_screen_hidden);'
              - lambda: 'return millis() - id(boot_start_time) >= 2000;'
          then:
            - script.execute: hide_boot_screen

globals:
  - id: wifi_connected
    type: bool
    initial_value: 'false'
  - id: g32_connected
    type: bool
    initial_value: 'false'
  - id: firebox_open
    type: bool
    initial_value: 'false'
  - id: light_on
    type: bool
    initial_value: 'false'
  - id: warning_on
    type: bool
    initial_value: 'false'
  - id: gas_weight
    type: int32_t
    initial_value: '-1'
  - id: gas_percent
    type: int32_t
    initial_value: '0'
  - id: ble_g32_scan_started_by_user  # for managing "scan" button status
    type: bool
    initial_value: 'false'
  - id: ble_meater_scan_started_by_user  # for managing "scan" button status
    type: bool
    initial_value: 'false'
  - id: ble_meaters_found  # bits set/reset for every active/inactive Meater probe
    type: int
    initial_value: '0'
  - id: apply_wifi_started_by_user  # for supressing sounds
    type: bool
    initial_value: 'false'

  - id: color_schemes
    type: std::map<std::string, std::vector<uint32_t>>
    initial_value: '${COLOR_SCHEMES}'
  - id: color_100
    type: int
    initial_value: '0x000000'
  - id: color_75
    type: int
    initial_value: '0x000000'
  - id: color_50
    type: int
    initial_value: '0x000000'
  - id: color_25
    type: int
    initial_value: '0x000000'
  - id: color_00
    type: int
    initial_value: '0x000000'
  - id: color_good
    type: int
    initial_value: '0x000000'
  - id: color_bad
    type: int
    initial_value: '0x000000'
  - id: color_light
    type: int
    initial_value: '0x000000'

  - id: boot_start_time
    type: uint32_t
    initial_value: '0'
  - id: boot_screen_hidden
    type: bool
    initial_value: 'false'
  - id: boot_screen_color_scheme_init
    type: bool
    initial_value: 'false'

  - id: active_sensors      # bits set/reset for every active/inactive Sensor
    type: int
    initial_value: '0'

  - id: active_meaters      # bits set/reset for every active/inactive Meater probe
    type: int
    initial_value: '0'

  - id: zone1_value         # the value used for zone temperature labels and arcs
    type: int
    initial_value: ${Invalid_Sensor_Value}
  - id: zone2_value
    type: int
    initial_value: ${Invalid_Sensor_Value}
  - id: zone3_value
    type: int
    initial_value: ${Invalid_Sensor_Value}
  - id: zone4_value
    type: int
    initial_value: ${Invalid_Sensor_Value}

  - id: sensor1_value       # the value used for sensor temperature labels and arcs
    type: int
    initial_value: ${Invalid_Sensor_Value}
  - id: sensor2_value
    type: int
    initial_value: ${Invalid_Sensor_Value}
  - id: sensor3_value
    type: int
    initial_value: ${Invalid_Sensor_Value}
  - id: sensor4_value
    type: int
    initial_value: ${Invalid_Sensor_Value}

  - id: zone1_limit_value   # the value used for zone limit labels and arcs
    type: int
    initial_value: '0'
  - id: zone2_limit_value
    type: int
    initial_value: '0'
  - id: zone3_limit_value
    type: int
    initial_value: '0'
  - id: zone4_limit_value
    type: int
    initial_value: '0'

  - id: sensor1_limit_value # the value used for sensor limit labels and arcs
    type: int
    initial_value: '0'
  - id: sensor2_limit_value
    type: int
    initial_value: '0'
  - id: sensor3_limit_value
    type: int
    initial_value: '0'
  - id: sensor4_limit_value
    type: int
    initial_value: '0'

  - id: meater_values_tip
    type: std::array<float, 4>
    initial_value: '{0.0,0.0,0.0,0.0}'
  - id: meater_values_ambient
    type: std::array<float, 4>
    initial_value: '{0.0,0.0,0.0,0.0}'
  - id: meater_values_battery
    type: std::array<int, 4>
    initial_value: '{100,100,100,100}'


  - id: meater_tip_alert
    type: float
    initial_value: '${meater_tip_alert}'
  - id: meater_ambient_alert
    type: float
    initial_value: '${meater_ambient_alert}'
  - id: meater_alarms_tip  # bits set/reset
    type: int
    initial_value: '0'
  - id: meater_alarms_ambient  # bits set/reset
    type: int
    initial_value: '0'

  - id: battery_soc_value
    type: int
    initial_value: '0'

  - id: sensor_index        # parameter for zone (1-4) or sensor (5-8)
    type: int
    initial_value: '0'
  - id: sensor_limit_value  # the actual sensor limit for the indexed Zone/Sensor
    type: int
    initial_value: '0'
  - id: sensor_max_value    # maximum value for zone and sensor values (arcs)
    type: int
    initial_value: '0'

  - id: settings_g32_mac_address_persistent
    type: std::string
    initial_value: '"${g32_mac_address}"' 
  - id: settings_meater_mac_addresses
    type: std::array<std::string, 4>
    initial_value: '{"${meater_mac_address}","${meater_mac_address}","${meater_mac_address}","${meater_mac_address}"}'
  - id: settings_min_gas_value_persistent
    type: int
    initial_value: '${SETTINGS_MIN_GAS_VALUE}'
    restore_value: true
  - id: settings_min_soc_value_persistent
    type: int
    initial_value: '${SETTINGS_MIN_SOC_VALUE}'
    restore_value: true
  - id: settings_hide_soc_persistent
    type: bool
    initial_value: '${SETTINGS_HIDE_SOC}'
    restore_value: true
  - id: settings_hide_gas_level_persistent
    type: bool
    initial_value: '${SETTINGS_HIDE_GAS_LEVEL}'
    restore_value: true
  - id: settings_enable_temperature_limits_persistent
    type: bool
    initial_value: 'true'
    restore_value: true
  - id: settings_enable_auto_hiding_temperature_limits_persistent
    type: bool
    initial_value: 'true'
  - id: settings_hide_inactive_sensors_persistent
    type: bool
    initial_value: 'false'
  - id: settings_display_timeout_value_persistent
    type: int
    initial_value: '30'
    restore_value: true
  - id: settings_color_scheme_idx_persistent
    type: int
    initial_value: '${SETTINGS_COLOR_SCHEME_IDX}'
    restore_value: true

  - id: current_ip_address
    type: std::string
    initial_value: '" "'  # not connected

text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip_sensor

select:
  - platform: template
    id: color_scheme_select
    name: "Color Scheme"
    optimistic: true
    options: ${color_scheme_options}
    on_value:
      - lambda: |-
          for (const auto& pair : id(color_schemes)) {
            if (pair.first == x) {
              id(settings_color_scheme_idx_persistent) = static_cast<int>(pair.second[0]);
              id(apply_color_scheme).execute();
              break;
            }
          }

switch:
  - platform: template
    name: "Hide Battery SOC"
    id: hide_soc_switch
    optimistic: true
    on_turn_on:
      - lambda: id(settings_hide_soc_persistent) = true;
      - lvgl.widget.refresh: battery_symbol_obj
    on_turn_off:
      - lambda: id(settings_hide_soc_persistent) = false;
      - lvgl.widget.refresh: battery_symbol_obj

  - platform: template
    name: "Hide Gas Level"
    id: hide_gas_level_switch
    optimistic: true
    on_turn_on:
      - lambda: id(settings_hide_gas_level_persistent) = true;
      - lvgl.widget.refresh: gas_level_obj
    on_turn_off:
      - lambda: id(settings_hide_gas_level_persistent) = false;
      - lvgl.widget.refresh: gas_level_obj

  - platform: template
    name: "Disable Temperature Alarms"
    id: enable_temperature_limits_switch
    optimistic: true
    on_turn_on:
      - lambda: |-
          id(settings_enable_temperature_limits_persistent) = false;
          if (!id(settings_enable_temperature_limits_persistent)) {
            id(zone1_limit_value) = 0;
            id(zone2_limit_value) = 0;
            id(zone3_limit_value) = 0;
            id(zone4_limit_value) = 0;
            id(sensor1_limit_value) = 0;
            id(sensor2_limit_value) = 0;
            id(sensor3_limit_value) = 0;
            id(sensor4_limit_value) = 0;
          }
      - script.execute: refresh_all_temps
      - script.execute: refresh_all_limits
    on_turn_off:
      - lambda: id(settings_enable_temperature_limits_persistent) = true;
      - script.execute: refresh_all_temps
      - script.execute: refresh_all_limits

  - platform: template
    name: "Disable Auto-Hiding Temperature Alarm Visualization"
    id: enable_auto_hiding_temperature_limits_switch
    optimistic: true
    on_turn_on:
      - lambda: id(settings_enable_auto_hiding_temperature_limits_persistent) = false;
      - script.execute: refresh_all_temps
      - script.execute: refresh_all_limits
    on_turn_off:
      - lambda: id(settings_enable_auto_hiding_temperature_limits_persistent) = true;
      - script.execute: refresh_all_temps
      - script.execute: refresh_all_limits

number:
  - platform: template
    name: "Min Gas Value"
    id: min_gas_value_number
    optimistic: true
    min_value: 5
    max_value: 60
    step: 5
    unit_of_measurement: "%"
    initial_value: 20.0
    on_value:
      - lambda: id(settings_min_gas_value_persistent) = int(x);
      - lvgl.widget.refresh: [warning_on_label, gas_percent_bar]

  - platform: template
    name: "Min Battery SOC Value"
    id: min_soc_value_number
    optimistic: true
    min_value: 5
    max_value: 50
    step: 10
    unit_of_measurement: "%"
    initial_value: 40.0
    on_value:
      - lambda: id(settings_min_soc_value_persistent) = int(x);
      - lvgl.widget.refresh: [warning_on_label, battery_symbol]

