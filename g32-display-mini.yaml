script:
  # Consolidated refresh scripts for performance optimization
  - id: refresh_all_temps
    then:
      - lvgl.widget.refresh:
          - zone1_label
          - zone1_label_large
          - zone1_arc
          - zone2_label
          - zone2_label_large
          - zone2_arc
          - zone3_label
          - zone3_label_large
          - zone3_arc
          - zone4_label
          - zone4_label_large
          - zone4_arc
          - sensor1_label
          - sensor1_label_large
          - sensor1_arc
          - sensor1_obj
          - sensor2_label
          - sensor2_label_large
          - sensor2_arc
          - sensor2_obj
          - sensor3_label
          - sensor3_label_large
          - sensor3_arc
          - sensor3_obj
          - sensor4_label
          - sensor4_label_large
          - sensor4_arc
          - sensor4_obj
      - lvgl.widget.redraw:

  - id: refresh_all_limits
    then:
      - lvgl.widget.refresh:
          - zone1_label
          - zone1_label_shadow
          - zone1_label_large
          - zone1_label_large_shadow
          - zone1_limit_arc
          - zone1_limit_label
          - zone1_limit_label_shadow
          - zone1_limit_label_bell
          - zone2_label
          - zone2_label_shadow
          - zone2_label_large
          - zone2_label_large_shadow
          - zone2_limit_arc
          - zone2_limit_label
          - zone2_limit_label_shadow
          - zone2_limit_label_bell
          - zone3_label
          - zone3_label_shadow
          - zone3_label_large
          - zone3_label_large_shadow
          - zone3_limit_arc
          - zone3_limit_label
          - zone3_limit_label_shadow
          - zone3_limit_label_bell
          - zone4_label
          - zone4_label_shadow
          - zone4_label_large
          - zone4_label_large_shadow
          - zone4_limit_arc
          - zone4_limit_label
          - zone4_limit_label_shadow
          - zone4_limit_label_bell
          - sensor1_obj
          - sensor1_label
          - sensor1_label_shadow
          - sensor1_label_large
          - sensor1_label_large_shadow
          - sensor1_limit_arc
          - sensor1_limit_label
          - sensor1_limit_label_shadow
          - sensor1_limit_label_bell
          - sensor1_battery
          - sensor2_obj
          - sensor2_label
          - sensor2_label_shadow
          - sensor2_label_large
          - sensor2_label_large_shadow
          - sensor2_limit_arc
          - sensor2_limit_label
          - sensor2_limit_label_shadow
          - sensor2_limit_label_bell
          - sensor2_battery
          - sensor3_obj
          - sensor3_label
          - sensor3_label_shadow
          - sensor3_label_large
          - sensor3_label_large_shadow
          - sensor3_limit_arc
          - sensor3_limit_label
          - sensor3_limit_label_shadow
          - sensor3_limit_label_bell
          - sensor3_battery
          - sensor4_obj
          - sensor4_label
          - sensor4_label_shadow
          - sensor4_label_large
          - sensor4_label_large_shadow
          - sensor4_limit_arc
          - sensor4_limit_label
          - sensor4_limit_label_shadow
          - sensor4_limit_label_bell
          - sensor4_battery
      - lvgl.widget.redraw:

  - id: refresh_all_meater_alerts
    then:
      - lvgl.widget.refresh:
          - sensor1_alert
          - sensor2_alert
          - sensor3_alert
          - sensor4_alert

  - id: hide_boot_screen
    then:
      - if:
          condition:
            lambda: 'return !id(boot_screen_hidden);'
          then:
            - lambda: |-
                id(active_meaters) = 0;
                id(meater_alarms_tip) = 0;
                id(meater_alarms_ambient) = 0;
            - lambda: |-
                id(apply_color_scheme).execute();
            - lvgl.widget.hide: boot_screen
            - lvgl.widget.show: [status_bar_right]
            - lambda: |-
                int idx = id(settings_color_scheme_idx_persistent);
                std::string name = "white";
                for (const auto& pair : id(color_schemes)) {
                  if (static_cast<int>(pair.second[0]) == idx) {
                    name = pair.first;
                    break;
                  }
                }
                id(color_scheme_select).publish_state(name);

            # some things to refresh from persisted settings
            - lvgl.widget.refresh: battery_symbol_obj

            # for settings_enable_temperature_limits_persistent, settings_enable_auto_hiding_temperature_limits_persistent, and settings_hide_inactive_sensors_persistent
            - lvgl.widget.refresh: [zone1_label, zone2_label, zone3_label, zone4_label]
            - lvgl.widget.refresh: [zone1_label_large, zone2_label_large, zone3_label_large, zone4_label_large]
            - lvgl.widget.refresh: [zone1_arc, zone2_arc, zone3_arc, zone4_arc]
            - lvgl.widget.refresh: [zone1_limit_arc, zone2_limit_arc, zone3_limit_arc, zone4_limit_arc]
            - lvgl.widget.refresh: [zone1_limit_label, zone2_limit_label, zone3_limit_label, zone4_limit_label]
            - lvgl.widget.refresh: [zone1_limit_label_bell, zone2_limit_label_bell, zone3_limit_label_bell, zone4_limit_label_bell]
            - lvgl.widget.refresh: [sensor1_obj, sensor2_obj, sensor3_obj, sensor4_obj]
            - lvgl.widget.refresh: [sensor1_label, sensor2_label, sensor3_label, sensor4_label]
            - lvgl.widget.refresh: [sensor1_label_large, sensor2_label_large, sensor3_label_large, sensor4_label_large]
            - lvgl.widget.refresh: [sensor1_limit_arc, sensor2_limit_arc, sensor3_limit_arc, sensor4_limit_arc]
            - lvgl.widget.refresh: [sensor1_limit_label, sensor2_limit_label, sensor3_limit_label, sensor4_limit_label]
            - lvgl.widget.refresh: [sensor1_limit_label_bell, sensor2_limit_label_bell, sensor3_limit_label_bell, sensor4_limit_label_bell]
            - lvgl.widget.refresh: [sensor1_battery, sensor2_battery, sensor3_battery, sensor4_battery]
            - if:
                condition:
                  lambda: return id(settings_hide_soc_persistent);
                then:
                  - switch.turn_on: hide_soc_switch
                else:
                  - switch.turn_off: hide_soc_switch
            - if:
                condition:
                  lambda: return id(settings_hide_gas_level_persistent);
                then:
                  - switch.turn_on: hide_gas_level_switch
                else:
                  - switch.turn_off: hide_gas_level_switch
            - if:
                condition:
                  lambda: return id(settings_enable_temperature_limits_persistent);
                then:
                  - switch.turn_off: enable_temperature_limits_switch
                else:
                  - switch.turn_on: enable_temperature_limits_switch
            - if:
                condition:
                  lambda: return id(settings_enable_auto_hiding_temperature_limits_persistent);
                then:
                  - switch.turn_off: enable_auto_hiding_temperature_limits_switch
                else:
                  - switch.turn_on: enable_auto_hiding_temperature_limits_switch
            - lambda: id(min_soc_value_number).publish_state(id(settings_min_soc_value_persistent));
            - lambda: id(min_gas_value_number).publish_state(id(settings_min_gas_value_persistent));
            - globals.set:
                id: boot_screen_hidden
                value: 'true'

  - id: ble_g32_scan_start
    then:
      - globals.set:
          id: ble_g32_scan_started_by_user
          value: 'true'

  - id: ble_g32_scan_stop
    then:
      - globals.set:
          id: ble_g32_scan_started_by_user
          value: 'false'

  - id: ble_meater_scan_start
    then:
      - globals.set:
          id: ble_meater_scan_started_by_user
          value: 'true'
      - globals.set:
          id: ble_meaters_found
          value: '0'

  - id: ble_meater_scan_stop
    then:
      - globals.set:
          id: ble_meater_scan_started_by_user
          value: 'false'

  - id: apply_mac_address
    then:
        # this ensures the ble_client changes MAC at runtime
        - lambda: !lambda |-
            uint64_t addr = 0;
            uint64_t b1, b2, b3, b4, b5, b6;
            if (sscanf(id(settings_g32_mac_address_persistent).c_str(), "%llx:%llx:%llx:%llx:%llx:%llx", &b1, &b2, &b3, &b4, &b5, &b6) == 6) {
              addr = (b1 << 40) | (b2 << 32) | (b3 << 24) | (b4 << 16) | (b5 << 8) | b6;
            }
            id(ow_g32).set_address(addr);
            ESP_LOGI("settings", "set G32 MAC address to %s", id(settings_g32_mac_address_persistent).c_str());

  - id: apply_meater_mac_addresses
    then:
        # this ensures the ble_client changes MAC at runtime
        - lambda: !lambda |-
            std::array<esphome::ble_client::BLEClient *, 4> meaters = {id(meater0), id(meater1), id(meater2), id(meater3)};
            for (int i = 0; i < 4; i++) {
              std::string mac = id(settings_meater_mac_addresses)[i];
              uint64_t addr = 0;
              uint64_t b1, b2, b3, b4, b5, b6;
              if (sscanf(mac.c_str(), "%llx:%llx:%llx:%llx:%llx:%llx", &b1, &b2, &b3, &b4, &b5, &b6) == 6) {
                addr = (b1 << 40) | (b2 << 32) | (b3 << 24) | (b4 << 16) | (b5 << 8) | b6;
              }
              if (addr != meaters[i]->get_address()) {
                meaters[i]->set_address(addr);
                ESP_LOGI("settings", "set meater%d MAC address to %s", i, mac.c_str());
              }
            }

  - id: apply_color_scheme
    mode: restart
    then:
      - lambda: |-
          int target_idx = id(settings_color_scheme_idx_persistent);   // current selected index (0,1,2,3)
          const std::vector<uint32_t>* selected_vec = nullptr;
          std::string selected_name = "unknown";

          // First: find the matching scheme by index (vec[0])
          for (const auto& pair : id(color_schemes)) {
            const auto& vec = pair.second;
            if (vec.empty()) continue;

            int scheme_idx = static_cast<int>(vec[0]);   // your 0,1,2,3
            if (scheme_idx == target_idx) {
              selected_vec = &vec;         // remember the correct vector
              selected_name = pair.first;  // remember the name for logging
              break;                       // found it → exit loop early
            }
          }

          // If nothing found (corrupted data?), fall back to first scheme (index 0)
          if (!selected_vec) {
            ESP_LOGW("color_scheme", "Invalid index %d → falling back to default (white)", target_idx);
            for (const auto& pair : id(color_schemes)) {
              const auto& vec = pair.second;
              if (vec.empty()) continue;
              if (static_cast<int>(vec[0]) == 0) {
                selected_vec = &vec;
                selected_name = pair.first;
                id(settings_color_scheme_idx_persistent) = 0;
                break;
              }
            }
          }

          if (selected_vec && selected_vec->size() >= 8) {
            id(color_100)   = (*selected_vec)[1];
            id(color_75)    = (*selected_vec)[2];
            id(color_50)    = (*selected_vec)[3];
            id(color_25)    = (*selected_vec)[4];
            id(color_00)    = (*selected_vec)[5];
            id(color_good)  = (*selected_vec)[6];
            id(color_bad)   = (*selected_vec)[7];
            id(color_light) = (*selected_vec)[8];

            if (${FORCE_SHADOW_COLOR_TO_BLACK}) {
              id(color_00) = 0x000000;
            }

            // THIS SCHOULD BE THE MAGIC LINE: tells every LVGL object that styles changed
            // BUT: DOES NOT WORK at the moment
            lv_obj_report_style_change(NULL);

            ESP_LOGI("color_scheme", "Applied scheme '%s' (index %d)", selected_name.c_str(), target_idx);
          } else {
            ESP_LOGE("color_scheme", "Failed to apply color scheme – data invalid");
          }
      - lambda: |-
          lv_obj_set_style_arc_color(boot_spinner, lv_color_hex(id(color_100)), LV_PART_INDICATOR);

