substitutions:
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password

esphome:
  name: mini
  friendly_name: mini
  on_boot:
    then:
      - switch.turn_on: screen_switch


esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "QG7vKkKNVyHMWjdsJvtz8vV6Q9Kk4fpAiI3qZ45qhwY="

ota:
  - platform: esphome
    password: "69e03fd1ff0eed9cfc81e9af0689c85a"

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Mini Fallback Hotspot"
    password: "pQjrpPQDV33v"

captive_portal:
# External Components
external_components:
  - source: github://widget/esphome-components
    components: [ axs5106 ]
    refresh: 0s
# I2C for touchscreen
i2c:
  sda: GPIO18
  scl: GPIO19
  frequency: 400kHz
  scan: false
  id: bus_a
# Touchscreen
touchscreen:
  platform: axs5106
  id: my_touchscreen
  interrupt_pin: 21
  reset_pin: 20
  on_touch:
      - lambda: |-
          ESP_LOGI("Touch", "Touch detected at x=%d, y=%d", touch.x, touch.y);
  on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - switch.turn_on: screen_switch
  calibration:
    x_min: 0
    y_min: 0
    y_max: 320
    x_max: 172
  transform:
    mirror_x: True

spi:
  clk_pin: GPIO1
  mosi_pin: GPIO2

color:
  - id: color_white
    hex: 'FFFFFF'
  - id: color_black
    hex: '000000'
  - id: color_blue
    hex: '0000FF'
  - id: color_green
    hex: '00FF00'
  - id: color_gray
    hex: 'C6C6C6'
  - id: color_red
    hex: 'FF0000'
  - id: color_orange
    hex: 'F5C77E'
  - id: color_cyan
    hex: '00FFFF'
  - id: color_yellow
    hex: 'FFFF00'

# Configuration de l'écran LCD
display:
  - platform: ili9xxx
    id: rpi_disp
    model: ST7789V
    dc_pin: GPIO15
    cs_pin: GPIO14
    reset_pin: GPIO22
    dimensions:
      width: 172
      height: 320
      offset_height: 0
      offset_width: 34
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: false
    invert_colors: false
    data_rate: 40MHz
    color_order: bgr
    # update_interval: 1s
    
output:
  - platform: ledc    
    id: lcd_backlight
    pin: GPIO23
    inverted: false
light:
  - platform: monochromatic # Define a monochromatic, dimmable light for the backlight
    output: lcd_backlight
    name: Display Backlight
    id: back_light
    restore_mode: ALWAYS_ON

    # =======================
    #  Single WS2812 RGB LED
    # =======================
  - platform: esp32_rmt_led_strip
    id: board_rgb_led
    name: "Board RGB LED"
    pin: GPIO8
    chipset: WS2812
    num_leds: 1               # only one LED on this board
    rgb_order: RGB            # WS2812 typically uses GRB order
    # rmt_channel: 0            # any free RMT channel (0-7)
    default_transition_length: 0ms   # instant change (optional)
    restore_mode: ALWAYS_ON   # optional

# Switch ON/OFF écran
switch:
  - platform: template
    name: "Ekran ON/OFF"
    id: screen_switch
    turn_on_action:
      - output.turn_on: lcd_backlight
    turn_off_action:
      - output.turn_off: lcd_backlight
    optimistic: true
  - platform: template  #### ANTI BURN
    name: Antiburn
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
time:  ### Antiburn TIME
  - platform: homeassistant
    on_time:
      - hours: 2,3,4,5
        minutes: 5
        seconds: 0
        then:
          - switch.turn_on: switch_antiburn
      - hours: 2,3,4,5
        minutes: 35
        seconds: 0
        then:
          - switch.turn_off: switch_antiburn
number:
  - platform: template
    name: LVGL Screen timeout
    optimistic: true
    id: display_timeout
    unit_of_measurement: "s"
    initial_value: 45
    restore_value: true
    min_value: 10
    max_value: 180
    step: 5
    mode: box    
lvgl:
  displays:
    - rpi_disp
  touchscreens:
    - my_touchscreen
  on_idle:
    timeout: !lambda "return (id(display_timeout).state * 1000);"
    then:
      - logger.log: "LVGL is idle"
      - switch.turn_off: screen_switch
      - lvgl.pause:
  pages:
    - id: main_page
      width: 100%
      bg_color: 0x000000
      bg_opa: cover
      widgets:
        - button:  ## AVİZE LAMBA
            id: SALON_AVIZE
            x: 0
            y: 10
            width: 172
            height: 80
            bg_opa: COVER
            bg_color: 0xff0000
            shadow_opa: TRANSP
            checkable: False
            widgets:
              - label:
                  align: LEFT_MID
                  text_font: MONTSERRAT_20
                  text: "xx1"
            on_click:
              - script.execute: set_purple

        - button:  ## DIŞ SICAKLIK
            x: 0
            y: 100
            width: 120
            height: 60
            bg_opa: COVER
            bg_color: 0x00ff00
            shadow_opa: TRANSP
            widgets:
              - label:
                  id: display_dis_sicaklik
                  text: out
                  text_font: MONTSERRAT_20
                  text_color: 0xffd700
            on_click:
              - script.execute: flash_red              

script:
  - id: flash_red
    then:
      - light.turn_on:
          id: board_rgb_led
          brightness: 100%
          red: 100%
          green: 0%
          blue: 0%
          effect: none

  - id: set_purple
    then:
      - light.turn_on:
          id: board_rgb_led
          brightness: 40%
          red: 80%
          green: 0%
          blue: 100%