          ]
    
output:
  - platform: ledc    
    id: lcd_backlight
    pin: GPIO23
    inverted: false
light:
  - platform: monochromatic # Define a monochromatic, dimmable light for the backlight
    output: lcd_backlight
    name: Display Backlight
    id: back_light
    restore_mode: ALWAYS_ON

# Switch ON/OFF écran
switch:
  - platform: template
    name: "Ekran ON/OFF"
    id: screen_switch
    turn_on_action:
      - output.turn_on: lcd_backlight
    turn_off_action:
      - output.turn_off: lcd_backlight
    optimistic: true
  - platform: template  #### ANTI BURN
    name: Antiburn
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
time:  ### Antiburn TIME
  - platform: homeassistant
    on_time:
      - hours: 2,3,4,5
        minutes: 5
        seconds: 0
        then:
          - switch.turn_on: switch_antiburn
      - hours: 2,3,4,5
        minutes: 35
        seconds: 0
        then:
          - switch.turn_off: switch_antiburn
number:
  - platform: template
    name: LVGL Screen timeout
    optimistic: true
    id: display_timeout
    unit_of_measurement: "s"
    initial_value: 45
    restore_value: true
    min_value: 10
    max_value: 180
    step: 5
    mode: box    
lvgl:
  displays:
    - rpi_disp
  touchscreens:
    - my_touchscreen
  on_idle:
    timeout: !lambda "return (id(display_timeout).state * 1000);"
    then:
      - logger.log: "LVGL is idle"
      - switch.turn_off: screen_switch
      - lvgl.pause:
  style_definitions:
    - id: header_footer
      bg_color: 0x2F8CD8
      bg_grad_color: 0x005782
      bg_grad_dir: VER
      bg_opa: COVER
      border_opa: TRANSP
      radius: 0
      pad_all: 0
      pad_row: 0
      pad_column: 0
      border_color: 0x0077b3
      text_color: 0xFFFFFF
      width: 100%
      height: 40
    - id: date_style      # choose an ID for your definition
      text_font: unscii_8
      align: center
      text_color: 0x000000
      bg_opa: cover
      radius: 4
      pad_all: 2
  pages:
    - id: main_page
      width: 100%
      bg_color: 0x000000
      bg_opa: cover
      widgets:
        - button:  ## AVİZE LAMBA
            id: SALON_AVIZE
            x: 0
            y: 10
            width: 172
            height: 80
            bg_opa: TRANSP
            shadow_opa: TRANSP
            checkable: False
            widgets:
              - label:
                  align: LEFT_MID
                  text_font: mdi_42
                  text: "xx\U000F1793"
                  long_mode : dot
            on_click:
              - homeassistant.action:
                  action: switch.toggle
                  data:
                    entity_id: switch.panel_relay_2
        - button:  ## DIŞ SICAKLIK
            x: 0
            y: 100
            width: 120
            height: 60
            bg_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - label:
                  id: display_dis_sicaklik
                  text: out
                  text_font: roboto70
                  text_color: 0xffd700
            on_click:
              - homeassistant.action:
                  action: switch.toggle
                  data:
                    entity_id: switch.panel_relay_2            
        
binary_sensor:
               
  - platform: homeassistant ### SALON AVİZE
    id: avize_switch
    entity_id: switch.panel_relay_2
    trigger_on_initial_state: true
    on_state:
      then:
        - if:
            condition:
               lambda: 'return id(avize_switch).state == true;'
            then:
              - lvgl.widget.update:
                  id: SALON_AVIZE
                  text_color: 0xffff00
            else:
              - lvgl.widget.update:
                  id: SALON_AVIZE
                  text_color: 0xFFFFFF
sensor:
################ DIŞ SICAKLIK ############### 
  - platform: homeassistant
    id: house_temp_sensor2
    entity_id: sensor.lumi_lumi_sens_temperature_3
    on_value:
     then:
         - lvgl.label.update:
            id: display_dis_sicaklik
            text: 
              format: " %.1f "
              args: ["id(house_temp_sensor2).state"]