substitutions:
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password

esphome:
  name: mini
  friendly_name: mini
  on_boot:
    then:
      - switch.turn_on: screen_switch
  

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "QG7vKkKNVyHMWjdsJvtz8vV6Q9Kk4fpAiI3qZ45qhwY="

ota:
  - platform: esphome
    password: "69e03fd1ff0eed9cfc81e9af0689c85a"

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Mini Fallback Hotspot"
    password: "pQjrpPQDV33v"

captive_portal:
# External Components
external_components:
  - source: github://widget/esphome-components
    components: [ axs5106 ]
    refresh: 0s
# I2C for touchscreen
i2c:
  sda: GPIO18
  scl: GPIO19
  frequency: 400kHz
  scan: false
  id: bus_a
# Touchscreen
touchscreen:
  platform: axs5106
  id: my_touchscreen
  interrupt_pin: 21
  reset_pin: 20
  on_touch:
      - lambda: |-
          ESP_LOGI("Touch", "Touch detected at x=%d, y=%d", touch.x, touch.y);
  on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - switch.turn_on: screen_switch
  calibration:
    x_min: 0
    y_min: 0
    y_max: 320
    x_max: 172
  transform:
    mirror_x: True

spi:
  clk_pin: GPIO1
  mosi_pin: GPIO2

color:
  - id: color_white
    hex: 'FFFFFF'
  - id: color_black
    hex: '000000'
  - id: color_blue
    hex: '0000FF'
  - id: color_green
    hex: '00FF00'
  - id: color_gray
    hex: 'C6C6C6'
  - id: color_red
    hex: 'FF0000'
  - id: color_orange
    hex: 'F5C77E'
  - id: color_cyan
    hex: '00FFFF'
  - id: color_yellow
    hex: 'FFFF00'

# Configuration de l'écran LCD
display:
  - platform: ili9xxx
    id: rpi_disp
    model: ST7789V
    dc_pin: GPIO15
    cs_pin: GPIO14
    reset_pin: GPIO22
    dimensions:
      width: 172
      height: 320
      offset_height: 0
      offset_width: 34
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: false
    invert_colors: false
    data_rate: 80MHz
    color_order: bgr
    update_interval: 1s
# Font
font:
  - file: "fonts/MaterialDesign-Webfont/materialdesignicons-webfont.ttf"
    id: mdi_42
    size: 50
    bpp: 4
    glyphs: [
      "\U000F0335", # mdi-lightbulb
      "\U000F0336", # mdi-lightbulb-outline
      "\U000F1793", # SALON AVİZE
      "\U000F08DD", # SALON KOŞE
      "\U000F0769", # SALON APLİK
      "\U000F1107", #PİRİZLER
      "\U000F0C0F", #mutfak1
      "\U000F0C11", #mutfak2
      "\U000F0C03", #ipek
      "\U000F1A60", #sokak
      "\U000F1020", #on_bahce
      "\U000F0D80",
      "\U000F04B9",
      "\U000F05BC",
      "\U000F0F92",
      "\U000F1B2A",
      "\U000F024A", 
    ]
  - file: "gfonts://Roboto"
    id: roboto70
    size: 50
    bpp: 4
    extras:
      - file: 'fonts/MaterialDesign-Webfont/materialdesignicons-webfont.ttf' # http://materialdesignicons.com/cdn/7.4.47/ 
        glyphs: ["\U000F081B", #KAPILAR
                  "\U000F11DB", #PENCERELER
                  "\U000F1107", #PİRİZLER
                  "\U000F1480", #CURRENT
                  "\U000F1088", #NUMARA 1
                  "\U000F1089", #NUMARA 2
                  "\U000F108A", #NUMARA 3
                  "\U000F0438", #KAZAN
                  "\U000F072A", # ÇAMAŞIR
                  "\U000F0448", # TV
                  "\U000F1AAF", # TERMOSIFON
                  "\U000F058F", # VANA
                  "\U000F0F93", # VANA KAPALI
                  "\U000F0A47", # SU MOTORU OFF
                  "\U000F01FA", # SU MOTORU ON
                  "\U000F1415", #  SU TANKI DOLU
                  "\U000F1416", #  SU TANKI BOS
